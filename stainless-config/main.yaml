# yaml-language-server: $schema=https://app.stainless.com/config.schema.json

# The main edition for the config, see the [docs] for more information.
#
# [docs]: https://www.stainless.com/docs/reference/editions
edition: 2026-02-23

organization:
  # Name of your organization or company, used to determine the name of the client
  # and headings.
  name: dashboard-sdk
  # Link to your API documentation.
  docs: https://imagekit.io
  # Contact email for bug reports, questions, and support requests.
  contact: developer@imagekit.io

# `targets` define the output targets and their customization options, such as
# whether to emit the Node SDK and what its package name should be.
targets:
  python:
    # The edition for this target, see the [docs] for more information.
    #
    # [docs]: https://www.stainless.com/docs/reference/editions
    edition: python.2025-11-20
    package_name: dashboard_sdk
    production_repo: null
    publish:
      pypi: false

# `environments` are a map of the name of the environment (e.g. "sandbox",
# "production") to the corresponding url to use.
environments:
  production: https://imagekit.io

# `resources` define the structure and organization for your API, such as how
# methods and models are grouped together and accessed. See the [configuration
# guide] for more information.
#
# [configuration guide]: https://www.stainless.com/docs/guides/configure#resources
resources:
  $client:
    models:
      # File and folder models
      file_details: '#/components/schemas/FileDetails'
      extension_status: '#/components/schemas/ExtensionStatus'
      metadata: '#/components/schemas/Metadata'
      folder_details: '#/components/schemas/FolderDetails'
      job_response: '#/components/schemas/JobResponse'
      
      # Media collection models
      media_collection_base: '#/components/schemas/MediaCollectionBase'
      
      # Custom metadata models
      custom_metadata_field: '#/components/schemas/CustomMetadataField'
      
      # Extension models
      saved_extension: '#/components/schemas/SavedExtension'
      removedot_bg_extension: '#/components/schemas/RemovedotBGExtension'
      auto_tagging_extension: '#/components/schemas/AutoTaggingExtension'
      auto_description_extension: '#/components/schemas/AutoDescriptionExtension'
      ai_tasks_extension: '#/components/schemas/AITasksExtension'
      ai_task_action: '#/components/schemas/AITaskAction'
      extension_config: '#/components/schemas/ExtensionConfig'
      extensions_items: '#/components/schemas/Extensions/items'
      
      # Transformation models
      src_options: '#/components/schemas/SrcOptions'
      transformation_position: '#/components/schemas/TransformationPosition'
      transformation: '#/components/schemas/Transformation'
      overlay: '#/components/schemas/Overlay'
      base_overlay: '#/components/schemas/BaseOverlay'
      overlay_position: '#/components/schemas/OverlayPosition'
      overlay_timing: '#/components/schemas/OverlayTiming'
      image_overlay: '#/components/schemas/ImageOverlay'
      video_overlay: '#/components/schemas/VideoOverlay'
      text_overlay_transformation: '#/components/schemas/TextOverlayTransformation'
      subtitle_overlay_transformation: '#/components/schemas/SubtitleOverlayTransformation'
      solid_color_overlay_transformation: '#/components/schemas/SolidColorOverlayTransformation'
      
      # Public link models
      public_link_request: '#/components/schemas/PublicLinkRequest'
      public_link_base: '#/components/schemas/PublicLinkBase'
      public_link_response: '#/components/schemas/PublicLinkResponse'
      public_link: '#/components/schemas/PublicLink'
      
      # Path policy models
      path_policy_custom_metadata_field_input: '#/components/schemas/PathPolicyCustomMetadataFieldInput'
      path_policy_custom_metadata_field_merged: '#/components/schemas/PathPolicyCustomMetadataFieldMerged'
      path_policy_base: '#/components/schemas/PathPolicyBase'
      path_policy_saved: '#/components/schemas/PathPolicySaved'
      
      # Origin and URL endpoint models
      origin_request: '#/components/schemas/OriginRequest'
      origin_response: '#/components/schemas/OriginResponse'
      url_endpoint_request: '#/components/schemas/UrlEndpointRequest'
      url_endpoint_response: '#/components/schemas/UrlEndpointResponse'
    
    methods:
      # File operations
      upload_file: post /api/v2-alpha/files/upload
      search_media_library: get /api/v2/files
      get_metadata_by_file_id:
        endpoint: get /api/v1/files/{fileId}/metadata
        skip: true
      get_file_details: get /api/v2/files/{fileId}/details
      update_file_details: patch /api/v2/files/{fileId}/details
      delete_file: delete /api/v2/files/{fileId}
      delete_files_batch: post /api/v2/files/batch/deleteByFileIds
      copy_file: post /api/v2/files/copy
      move_file: post /api/v2/files/move
      rename_file: put /api/v2/files/rename
      publish_file: put /api/v2/files/{fileId}/publish
      
      # Tag management
      add_tags_bulk: post /api/v2/files/addTags
      remove_tags_bulk: post /api/v2/files/removeTags
      remove_ai_tags_bulk: post /api/v2/files/removeAITags
      
      # File versions
      list_file_versions: get /api/v2/files/{fileId}/versions
      get_file_version_details: get /api/v2/files/{fileId}/versions/{versionId}
      delete_file_version: delete /api/v2/files/{fileId}/versions/{versionId}
      restore_file_version: put /api/v2/files/{fileId}/versions/{versionId}/restore
      
      # Cache management
      purge_cache: post /api/v1/files/purge
      get_purge_status: get /api/v1/files/purge/{requestId}
      
      # File collaboration
      get_comments: get /api/media-library/{clientNumber}/files/{fileId}/threads
      
      # Bulk file operations
      apply_extension_bulk: post /api/media-library/{clientNumber}/files/bulk/apply-extension
      update_metadata_bulk: post /api/media-library/{clientNumber}/files/bulk/custom-metadata
      get_supported_metadata_fields: post /api/media-library/{clientNumber}/files/bulk/custom-metadata/supported-fields
      
      # Folder operations
      create_folder: post /api/v2/folder
      delete_folder: delete /api/v2/folder
      get_folder_details: get /api/v2/folder/details
      update_folder_details: patch /api/v2/folder/details
      copy_folder: post /api/v2/bulkJobs/copyFolder
      move_folder: post /api/v2/bulkJobs/moveFolder
      rename_folder: post /api/v2/bulkJobs/renameFolder
      list_bulk_jobs: get /api/v2/bulkJobs
      get_bulk_job_status: get /api/v2/bulkJobs/{jobId}
      
      # Media collections
      list_media_collections: get /api/v2/media-collections
      create_media_collection: post /api/v2/media-collections
      get_media_collection_details: get /api/v2/media-collections/{mediaCollectionId}/details
      update_media_collection: patch /api/v2/media-collections/{mediaCollectionId}
      update_media_collection_details: patch /api/v2/media-collections/{mediaCollectionId}/details
      delete_media_collection: delete /api/v2/media-collections/{mediaCollectionId}
      update_media_collection_thumbnail: put /api/v1/media-collections/{mediaCollectionId}/thumbnail
      add_assets_to_media_collection: post /api/v2/media-collections/add-assets
      remove_assets_from_media_collection: post /api/v2/media-collections/remove-assets
      list_collection_assets: get /api/v2/media-collections/{mediaCollectionId}/assets
      get_collection_access_list: get /api/v2/media-collections/{mediaCollectionId}/access-list
      
      # Custom metadata fields
      create_custom_metadata_field: post /api/v1/customMetadataFields
      list_custom_metadata_fields: get /api/v1/customMetadataFields
      update_custom_metadata_field: patch /api/v1/customMetadataFields/{id}
      delete_custom_metadata_field: delete /api/v1/customMetadataFields/{id}
      
      # Saved extensions
      list_saved_extensions: get /api/v1/saved-extensions
      create_saved_extension: post /api/v1/saved-extensions
      get_saved_extension: get /api/v1/saved-extensions/{id}
      update_saved_extension: patch /api/v1/saved-extensions/{id}
      delete_saved_extension: delete /api/v1/saved-extensions/{id}
      
      # Downloads
      list_zip_downloads: get /api/v1/download
      create_zip_download: post /api/v1/download
      get_zip_download_status: get /api/v1/download/{jobId}
      
      # Public links
      list_public_links: get /api/media-library/{clientNumber}/assets/{assetId}/public-links
      create_public_link: post /api/media-library/{clientNumber}/assets/{assetId}/public-links
      get_public_link: get /api/media-library/{clientNumber}/assets/{assetId}/public-links/{linkId}
      update_public_link: put /api/media-library/{clientNumber}/assets/{assetId}/public-links/{linkId}
      delete_public_link: delete /api/media-library/{clientNumber}/assets/{assetId}/public-links/{linkId}
      
      # AI image generation
      list_ai_images: get /api/media-library/{clientNumber}/generate-image
      generate_ai_image: post /api/media-library/{clientNumber}/generate-image
      get_ai_image_details: get /api/media-library/{clientNumber}/generate-image/{imageId}
      download_ai_image: get /api/media-library/{clientNumber}/generate-image/{imageId}/download
      delete_ai_images: delete /api/media-library/{clientNumber}/generate-image
      
      # Path policies
      list_path_policies: get /api/clients/{clientNumber}/path-policy
      create_path_policy: post /api/clients/{clientNumber}/path-policy
      get_path_policy: get /api/clients/{clientNumber}/path-policy/{policyId}
      update_path_policy: put /api/clients/{clientNumber}/path-policy/{policyId}
      delete_path_policy: delete /api/clients/{clientNumber}/path-policy/{policyId}
      
      # Origins
      list_origins: get /api/v1/accounts/origins
      create_origin: post /api/v1/accounts/origins
      get_origin: get /api/v1/accounts/origins/{id}
      update_origin: put /api/v1/accounts/origins/{id}
      delete_origin: delete /api/v1/accounts/origins/{id}
      
      # URL endpoints
      list_url_endpoints: get /api/v1/accounts/url-endpoints
      create_url_endpoint: post /api/v1/accounts/url-endpoints
      get_url_endpoint: get /api/v1/accounts/url-endpoints/{id}
      update_url_endpoint: put /api/v1/accounts/url-endpoints/{id}
      delete_url_endpoint: delete /api/v1/accounts/url-endpoints/{id}
      
      # Account
      get_account_usage: get /api/v1/accounts/usage
      
      # Skipped/internal endpoints (kept for schema completeness)
      get_metadata_by_remote_url:
        endpoint: get /api/v1/metadata
        skip: true
      dummy_test:
        endpoint: post /api/v1/dummy/test
        skip: true

settings:
  # All generated integration tests that hit the prism mock http server are marked
  # as skipped. Removing this setting or setting it to false enables tests, but
  # doing so may result in test failures due to bugs in the test server.
  #
  # [prism mock http server]: https://stoplight.io/open-source/prism
  disable_mock_tests: true
  license: Apache-2.0

# `client_settings` define settings for the API client, such as extra constructor
# arguments (used for authentication), retry behavior, idempotency, etc.
client_settings:
  opts:
    auth_endpoint:
      type: string
      format: uri
      default: https://imagekit.io/api/clients/B1NOVrAA/upload/signature/v2
    upload_api_endpoint:
      type: string
      format: uri
      default: https://upload.imagekit.io/api/v2-alpha/files/upload
    public_key:
      type: string
      format: uri
    

# `readme` is used to configure the code snippets that will be rendered in the
# README.md of various SDKs. In particular, you can change the `headline`
# snippet's endpoint and the arguments to call it with.
readme:
  example_requests:
    default:
      type: request
      endpoint: get /api/v2/files
      params: {}
    headline:
      type: request
      endpoint: get /api/v2/files
      params: {}
