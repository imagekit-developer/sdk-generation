      description: |
        Retrieve the access control list (ACL) for a media collection — all users and user groups with their permission levels (READ, CONTRIBUTE, or MANAGE).

        **When to use:** Check who has access to a collection before modifying permissions. To change permissions, use `update-media-collection` with the `acl` field.
