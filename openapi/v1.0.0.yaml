                    example: For support kindly contact us at support@imagekit.io.
  /api/v1/saved-extensions:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Saved Extensions
      operationId: list-saved-extensions
      summary: List all saved extension presets
      description: |
        Retrieve all saved extension presets in your account. These can be referenced by ID in `bulk-apply-extensions`, `update-file-details`, or upload APIs.
        
        **When to use:** Call this before applying extensions to files to discover available extension IDs and their configurations (e.g., "remove-bg-preset", "auto-tag-products").
        
