  /api/v1/accounts/usage:
    get:
      tags:
        - Account Management API
      operationId: get-usage
      summary: Get account usage information
      description: >
        Returns account usage metrics (bandwidth, storage, video processing units, extension units) for a date range. The response includes data from the start date up to but not including the end date. Maximum date range is 90 days.

        **When to use:** Monitor your account's resource consumption, track bandwidth usage trends, or check storage utilization for billing and capacity planning.
      parameters:
        - in: query
          name: startDate
          description: Specify a `startDate` in `YYYY-MM-DD` format. It should be before the `endDate`. The difference between `startDate` and `endDate` should be less than 90 days.
          schema:
            type: string
            format: date
          required: true
        - in: query
          name: endDate
          description: Specify a `endDate` in `YYYY-MM-DD` format. It should be after the `startDate`. The difference between `startDate` and `endDate` should be less than 90 days.
          schema:
            type: string
            format: date
          required: true
      responses:
        "200":
          description: In the response, you will get different usage metrics.
          content:
            application/json:
              schema:
                type: object
                properties:
                  bandwidthBytes:
                    type: integer
                    description: Amount of bandwidth used in bytes.
                  mediaLibraryStorageBytes:
                    type: integer
                    description: Storage used by media library in bytes.
                  videoProcessingUnitsCount:
                    type: integer
                    description: Number of video processing units used.
                  extensionUnitsCount:
                    type: integer
                    description: Number of extension units used.
                  originalCacheStorageBytes:
                    type: integer
                    description: Storage used by the original cache in bytes.
              examples:
                default:
                  value:
                    bandwidthBytes: 21991583578
                    mediaLibraryStorageBytes: 1878758298
                    videoProcessingUnitsCount: 0
                    extensionUnitsCount: 0
                    originalCacheStorageBytes: 0
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - startDate and endDate should be within 90 days.
                      - startDate and endDate are required in query parameters.
                      - startDate and endDate should be in format YYYY-MM-DD.
                      - startDate should be before endDate.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/accounts/origins:
    get:
      summary: List origins
      tags:
        - Account Management API
        - Origins
      operationId: list-origins
      description: >
        **Note:** This API is currently in beta.

        Returns all configured origins (external storage sources) for the account. Origins define where ImageKit fetches original files from when they are not found in the Media Library. Supported origin types: S3, S3-compatible, Google Cloud Storage, Azure Blob, Web Folder, Web Proxy, Cloudinary Backup, and Akeneo PIM.

        **When to use:** List all connected storage origins to see which external sources are configured, before creating URL-endpoints or debugging file delivery issues.
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OriginResponse"
        "401": &a1
          $ref: "#/components/responses/Unauthorized"
        "403": &a2
          $ref: "#/components/responses/Forbidden"
        "429": &a3
          $ref: "#/components/responses/RateLimitExceeded"
    post:
      summary: Create origin
      tags:
        - Account Management API
        - Origins
      operationId: create-origin
      description: >
        **Note:** This API is currently in beta.

        Creates a new origin (external storage source) that ImageKit will use to fetch files when they are not found in the Media Library. After creating an origin, attach it to a URL-endpoint using the URL-endpoint APIs.

        **Supported origin types:** `S3`, `S3_COMPATIBLE`, `GCS` (Google Cloud Storage), `AZURE_BLOB`, `WEB_FOLDER`, `WEB_PROXY`, `CLOUDINARY_BACKUP`, `AKENEO_PIM`. Each type requires different credentials (e.g., bucket + access keys for S3, base URL for web folder).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OriginRequest"
      responses:
        "201":
          description: Origin created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OriginResponse"
