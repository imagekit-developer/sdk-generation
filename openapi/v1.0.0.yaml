              description: Forward the Host header to origin?
              example: false
              default: false
              type: boolean
          required:
            - name
            - type
            - baseUrl
          additionalProperties: false
        - title: Web Proxy
          type: object
          properties:
            name:
              description: Display name of the origin.
              example: US S3 Storage
              type: string
              minLength: 1
              maxLength: 100
              pattern: ^[a-zA-Z0-9 ]+$
            type:
              type: string
              const: "WEB_PROXY"
            includeCanonicalHeader:
              description: Whether to send a Canonical header.
              example: false
              default: false
              type: boolean
            baseUrlForCanonicalHeader:
              description: URL used in the Canonical header (if enabled).
              example: https://cdn.example.com
              type: string
              format: uri
          required:
            - name
            - type
          additionalProperties: false
        - title: Google Cloud Storage (GCS)
          type: object
          properties:
            name:
              description: Display name of the origin.
              example: US S3 Storage
              type: string
              minLength: 1
              maxLength: 100
              pattern: ^[a-zA-Z0-9 ]+$
            type:
              type: string
              const: "GCS"
            includeCanonicalHeader:
              description: Whether to send a Canonical header.
              example: false
              default: false
              type: boolean
            baseUrlForCanonicalHeader:
              description: URL used in the Canonical header (if enabled).
              example: https://cdn.example.com
              type: string
              format: uri
            bucket:
              example: gcs-media
              type: string
              minLength: 1
              maxLength: 100
            prefix:
              example: products
              default: ""
              type: string
              maxLength: 100
            clientEmail:
              example: service-account@project.iam.gserviceaccount.com
              type: string
              format: email
              pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
            privateKey:
              example: -----BEGIN PRIVATE KEY-----\nMIIEv...
              type: string
              minLength: 1
          required:
            - name
            - type
            - bucket
            - clientEmail
            - privateKey
          additionalProperties: false
        - title: Azure Blob Storage
          type: object
