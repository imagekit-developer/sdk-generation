  /api/media-library/{clientNumber}/generate-image:
    get:
      tags:
        - Digital Asset Management (DAM)
        - AI Image Generation
      operationId: list-generated-images
      summary: List generated images
      description: |
        Retrieves a list of AI-generated images for the account. Supports filtering by prompt text, date range, and user IDs, with pagination via skip and limit parameters.
        
        **Search behavior:**
        - When no filters are provided, images are retrieved directly from MongoDB, sorted by creation date (newest first).
        - When any filter is applied (prompt, date range, or user IDs), the search uses Elasticsearch for efficient querying.
        - The `prompt` filter uses multi-match with bool_prefix for flexible text search.
        
        **Permissions:**
        - Requires `RESTRICTED_SELF_MEDIA_LIBRARY_VIEW` permission.
        - Restricted users can only see images they created.
        
        **Feature gate:** The `MEDIA_LIBRARY_STORAGE` feature must be enabled.
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
        - in: query
          name: prompt
          required: false
          schema:
            type: string
            minLength: 1
          description: |
            Optional text to search within image prompts. Uses fuzzy matching to find images whose prompts contain this text.
          example: "sunset landscape"
        - in: query
          name: startDate
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Optional ISO 8601 date-time string. Returns only images created on or after this date.
          example: "2024-01-01T00:00:00.000Z"
        - in: query
          name: endDate
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Optional ISO 8601 date-time string. Returns only images created on or before this date.
          example: "2024-12-31T23:59:59.999Z"
        - in: query
          name: userIds
          required: false
          schema:
            type: string
          description: |
            Optional comma-separated list of user IDs (MongoDB ObjectIds) to filter by image creators. Example: "507f1f77bcf86cd799439011,507f1f77bcf86cd799439012"
          example: "507f1f77bcf86cd799439011,507f1f77bcf86cd799439012"
        - in: query
          name: skip
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of images to skip for pagination.
          example: 0
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Maximum number of images to return. Must be between 1 and 1000.
          example: 100
      responses:
        "200":
          description: Successfully retrieved list of generated images.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - imageId
                    - url
                    - prompt
                    - height
                    - width
                    - createdBy
                    - createdAt
                  properties:
                    imageId:
                      type: string
                      description: Unique identifier for the generated image (MongoDB ObjectId).
                      example: "507f1f77bcf86cd799439011"
                    url:
                      type: string
                      format: uri
                      description: Direct URL to access the generated image.
                      example: "https://ik.imagekit.io/demo/ik-genimg-prompt-sunset/abc123/image.jpg?tr=f-jpg,h-1024,w-768"
                    prompt:
                      type: string
                      description: The text prompt used to generate this image.
                      example: "A beautiful sunset over mountains"
                    height:
                      type: integer
                      description: Height of the generated image in pixels.
                      example: 1024
                    width:
                      type: integer
                      description: Width of the generated image in pixels.
                      example: 768
                    createdBy:
                      type: object
                      required:
                        - userId
                        - email
                        - name
                      properties:
                        userId:
                          type: string
                          description: ID of the user who generated the image.
                          example: "507f1f77bcf86cd799439011"
                        email:
                          type: string
                          format: email
                          description: Email of the user who generated the image.
                          example: "user@example.com"
                        name:
                          type: string
                          description: Name of the user who generated the image.
                          example: "John Doe"
                    createdAt:
                      type: string
                      format: date-time
                      description: ISO 8601 timestamp when the image was generated.
                      example: "2024-03-20T10:30:00.000Z"
              example:
                - imageId: "507f1f77bcf86cd799439011"
                  url: "https://ik.imagekit.io/demo/ik-genimg-prompt-sunset/abc123/image.jpg?tr=f-jpg,h-1024,w-768"
                  prompt: "A beautiful sunset over mountains"
                  height: 1024
                  width: 768
                  createdBy:
                    userId: "507f1f77bcf86cd799439012"
                    email: "user@example.com"
                    name: "John Doe"
                  createdAt: "2024-03-20T10:30:00.000Z"
        "400":
          description: |
            Bad request. Common causes:
            - Invalid date-time format for startDate or endDate
            - Skip value below 0
            - Limit value outside 1-1000 range
            - Invalid prompt type
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - "Start date must be a valid date-time string."
                      - "End date must be a valid date-time string."
                      - "Skip must be at least 0."
                      - "Limit must be at least 1."
                      - "Limit must be no more than 1000."
                      - "Invalid prompt. It should be a string."
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
    post:
      tags:
        - Digital Asset Management (DAM)
        - AI Image Generation
      operationId: generate-images
      summary: Generate new AI images
      description: |
        Generates one or more AI images based on a text prompt. The API creates image URLs with the specified dimensions and returns the metadata for each generated image.
        
        **How it works:**
        1. Provide a descriptive text prompt and specify the number of images, height, and width.
        2. The API generates unique URLs for each image using ImageKit's transformation capabilities.
        3. Image records are saved to the database and associated with the authenticated user.
        4. Generated images can be listed, downloaded, or deleted using other endpoints.
        
        **Constraints:**
        - Maximum 10 images can be generated per request.
        - Prompt must be at least 1 character long.
        - Height and width must be valid positive integers.
        
        **Permissions:**
        - Requires `RESTRICTED_SELF_MEDIA_LIBRARY_MANAGE` permission.
        - Restricted users can only generate images under their own account.
        
        **Feature gate:** The `MEDIA_LIBRARY_STORAGE` feature must be enabled.
        
        **Audit logging:** This operation is logged as `GENERATE_IMAGE_FROM_TEXT`.
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt
                - numImages
                - height
                - width
              properties:
                prompt:
                  type: string
                  minLength: 1
                  description: Text prompt describing the image(s) to generate.
                  example: "A beautiful sunset over mountains with snow peaks"
                numImages:
                  type: integer
                  minimum: 1
                  maximum: 10
                  description: Number of images to generate. Must be between 1 and 10.
                  example: 3
                height:
                  type: integer
                  description: Height of the generated image(s) in pixels.
                  example: 1024
                width:
                  type: integer
                  description: Width of the generated image(s) in pixels.
                  example: 768
              additionalProperties: false
            example:
              prompt: "A beautiful sunset over mountains with snow peaks"
              numImages: 3
              height: 1024
              width: 768
      responses:
        "200":
          description: Images generated successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - imageId
                    - url
                    - prompt
                    - height
                    - width
                    - createdBy
                    - createdAt
                  properties:
                    imageId:
                      type: string
                      description: Unique identifier for the generated image (MongoDB ObjectId).
                      example: "507f1f77bcf86cd799439011"
                    url:
                      type: string
                      format: uri
                      description: Direct URL to access the generated image.
                      example: "https://ik.imagekit.io/demo/ik-genimg-prompt-sunset/abc123/image.jpg?tr=f-jpg,h-1024,w-768"
                    prompt:
                      type: string
                      description: The text prompt used to generate this image.
                      example: "A beautiful sunset over mountains with snow peaks"
                    height:
                      type: integer
                      description: Height of the generated image in pixels.
                      example: 1024
                    width:
                      type: integer
                      description: Width of the generated image in pixels.
                      example: 768
                    createdBy:
                      type: object
                      required:
                        - userId
                        - email
                        - name
                      properties:
                        userId:
                          type: string
                          description: ID of the user who generated the image.
                          example: "507f1f77bcf86cd799439012"
                        email:
                          type: string
                          format: email
                          description: Email of the user who generated the image.
                          example: "user@example.com"
                        name:
                          type: string
                          description: Name of the user who generated the image.
                          example: "John Doe"
                    createdAt:
                      type: string
                      format: date-time
                      description: ISO 8601 timestamp when the image was generated.
                      example: "2024-03-20T10:30:00.000Z"
              example:
                - imageId: "507f1f77bcf86cd799439011"
                  url: "https://ik.imagekit.io/demo/ik-genimg-prompt-sunset/abc123/image.jpg?tr=f-jpg,h-1024,w-768"
                  prompt: "A beautiful sunset over mountains with snow peaks"
                  height: 1024
                  width: 768
                  createdBy:
                    userId: "507f1f77bcf86cd799439012"
                    email: "user@example.com"
                    name: "John Doe"
                  createdAt: "2024-03-20T10:30:00.000Z"
        "400":
          description: |
            Bad request. Common causes:
            - Missing required fields (prompt, numImages, height, or width)
            - Invalid data types
            - Number of images outside 1-10 range
            - Additional unexpected parameters in request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - "Prompt is required."
                      - "Number of images is required."
                      - "Height is required."
                      - "Width is required."
                      - "Invalid prompt. It should be a string."
                      - "Invalid number of images. It should be an integer."
                      - "Number of images must be at least 1."
                      - "Number of images must be no more than 10."
                      - "Height must be a valid number."
                      - "Width must be a valid number."
                      - "Your request must not contain any additional parameters."
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
    delete:
      tags:
        - Digital Asset Management (DAM)
        - AI Image Generation
      operationId: delete-generated-images
      summary: Delete generated images
      description: |
        Deletes one or more AI-generated images by their IDs. This operation permanently removes the image records from the database.
        
        **Behavior:**
        - All specified image IDs must exist in the account.
        - If any image ID is not found, the operation fails and returns the missing IDs.
        - Restricted users can only delete images they created.
        - Non-restricted users can delete any images in their account.
        
        **Permissions:**
        - Requires `RESTRICTED_SELF_MEDIA_LIBRARY_MANAGE` permission.
        
        **Feature gate:** The `MEDIA_LIBRARY_STORAGE` feature must be enabled.
        
        **Audit logging:** This operation is logged as `DELETE_IMAGE_GENERATED_FROM_TEXT`.
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - imageIds
              properties:
                imageIds:
                  type: array
                  items:
                    type: string
                    minLength: 1
                  minItems: 1
                  description: Array of image IDs (MongoDB ObjectIds) to delete. At least one ID is required.
                  example: ["507f1f77bcf86cd799439011", "507f1f77bcf86cd799439012"]
              additionalProperties: false
            example:
              imageIds:
                - "507f1f77bcf86cd799439011"
                - "507f1f77bcf86cd799439012"
      responses:
        "200":
          description: Images deleted successfully. Returns the array of deleted image IDs.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                description: Array of successfully deleted image IDs.
                example: ["507f1f77bcf86cd799439011", "507f1f77bcf86cd799439012"]
        "400":
          description: |
            Bad request. Common causes:
            - imageIds is not an array
            - imageIds array is empty
            - imageIds contains non-string values
            - Additional unexpected parameters in request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - "Image IDs are required."
                      - "Invalid image IDs. It should be an array of strings."
                      - "Each image ID must be a valid string."
                      - "At least one image ID must be provided."
                      - "Your request must not contain any additional parameters."
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Forbidden. User is not allowed to perform this operation. This occurs when:
            - A restricted user attempts to delete images created by another user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User is not allowed to perform the requested operation."
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "404":
          description: |
            One or more image IDs not found. The response includes which specific IDs are missing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - "Some images were not found."
                      - "No image(s) found to delete."
                  missingImageIds:
                    type: array
                    items:
                      type: string
                    description: Array of image IDs that were not found in the database.
                    example: ["507f1f77bcf86cd799439013"]
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
