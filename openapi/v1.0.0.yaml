        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: Thumbnail updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Thumbnail updated successfully
                  thumbnailURL:
                    type: string
                    format: uri
                    description: URL of the new thumbnail image.
        "404":
