  /api/v2/media-collections/{mediaCollectionId}/assets:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Media Collections
      operationId: get-media-collection-assets
      summary: Get assets in media collection
      description: |
        List all files that belong to a specific media collection, with filtering, sorting, and pagination. Supports filtering by file type, name, and tags.

        **When to use:** Browse the contents of a collection. To search across all files (not limited to a collection), use `list-and-search-assets` instead. To add or remove files from this collection, use `add-assets-to-media-collections` or `remove-assets-from-media-collections`.
      parameters:
        - in: path
          name: mediaCollectionId
          required: true
          description: |
            The unique ID of the media collection (MongoDB ObjectId format).
          schema:
            type: string
        - in: query
          name: skip
          required: false
          description: |
            The number of results to skip before returning results.
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          required: false
          description: |
            The maximum number of results to return in response.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1000
        - in: query
          name: sort
          required: false
          description: |
            Sort the results by one of the supported fields.
          schema:
            type: string
            enum:
              - ASC_NAME
              - DESC_NAME
              - ASC_CREATED
              - DESC_CREATED
              - ASC_UPDATED
              - DESC_UPDATED
            default: ASC_CREATED
        - in: query
          name: type
          required: false
          description: |
            Filter by asset type.
          schema:
            type: string
            enum:
              - file
              - folder
              - all
            default: file
        - in: query
          name: fileType
          required: false
          description: |
            Filter by file type.
          schema:
            type: string
            enum:
              - all
              - image
              - non-image
            default: all
        - in: query
          name: name
          required: false
          description: |
            Filter by file name.
          schema:
            type: string
        - in: query
          name: tags
          required: false
          description: |
            Filter by tags.
          schema:
            type: string
        - in: query
          name: searchQuery
          required: false
          description: |
            Advanced search query string.
          schema:
            type: string
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: Array of asset objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileDetails"
        "404":
          description: Media collection not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Media collection not found.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid parameters.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v1/media-collections/{mediaCollectionId}/thumbnail:
    put:
      tags:
