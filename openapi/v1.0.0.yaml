      operationId: update-media-collection-thumbnail
      summary: Update media collection thumbnail
      description: |
        Upload or remove the thumbnail image displayed for a media collection. Send a thumbnail file to set it, or send an empty request to remove the existing thumbnail.

        **When to use:** Set a representative preview image for a collection (e.g., a hero image for a campaign collection). The thumbnail is shown when browsing collections in the media library UI.
      parameters:
