        urlRewriter:
          description: Configuration for third-party URL rewriting.
          discriminator:
            propertyName: type
          oneOf:
            - title: Cloudinary URL Rewriter
              type: object
              properties:
                type:
                  type: string
                  const: "CLOUDINARY"
                preserveAssetDeliveryTypes:
                  description:
                    Whether to preserve `<asset_type>/<delivery_type>` in the rewritten
                    URL.
                  example: true
                  default: false
                  type: boolean
              required:
                - type
                - preserveAssetDeliveryTypes
              additionalProperties: false
            - title: Imgix URL Rewriter
              type: object
              properties:
                type:
                  type: string
                  const: "IMGIX"
              required:
                - type
              additionalProperties: false
            - title: Akamai URL Rewriter
              type: object
              properties:
