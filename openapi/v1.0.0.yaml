        "429":
          $ref: "#/components/responses/RateLimitExceeded"
  /api/media-library/{clientNumber}/files/{fileId}/threads:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Threads & Comments
      operationId: list-file-threads
      summary: List threads for a file
      description: |
        Retrieves all comment threads associated with a specific file. Each thread contains all its comments, making this endpoint ideal for displaying file annotations and collaborative feedback.
        
        **Thread Structure:**
        - A thread represents a conversation started on a file or file version
        - Threads can be positioned at specific coordinates (for images) or timestamps (for videos)
        - Each thread contains an array of comments with reactions and edit history
        - Threads can be marked as resolved/unresolved
        
        **Use Cases:**
        - Display all comments/annotations on a file
        - Show collaborative feedback and reviews
        - Track resolved vs. unresolved discussions
        - Enable comment-based workflows
        
        **Permissions:**
        - Requires `RESTRICTED_SELF_MEDIA_LIBRARY_VIEW` permission
        - Restricted users must have at least READ access to the file (checked via ACL)
        - Access is validated through media collections and direct file permissions
        
        **Feature gate:** The `MEDIA_LIBRARY_STORAGE` feature must be enabled.
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
        - in: path
          name: fileId
          required: true
          schema:
            type: string
          description: Unique identifier of the file (MongoDB ObjectId).
          example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Successfully retrieved list of threads. Returns an empty array if no threads exist for the file.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - threadId
                    - fileId
                    - resolved
                    - comments
                    - createdAt
                    - updatedAt
                  properties:
                    threadId:
                      type: string
                      description: Unique identifier for the thread (MongoDB ObjectId).
                      example: "507f1f77bcf86cd799439012"
                    fileId:
                      type: string
                      description: ID of the file this thread belongs to.
                      example: "507f1f77bcf86cd799439011"
                    versionId:
                      type: string
                      nullable: true
                      description: Optional ID of the specific file version this thread is associated with. Null if thread applies to the current version.
                      example: "507f1f77bcf86cd799439013"
                    resolved:
                      type: boolean
                      description: Whether the thread has been marked as resolved.
                      example: false
                    timestamp:
                      type: number
                      nullable: true
                      description: Optional timestamp in seconds for video comments. Indicates the position in the video where the comment was made.
                      example: 45.5
                    position:
                      type: object
                      nullable: true
                      description: Optional coordinate position for image annotations. Contains x and y coordinates.
                      properties:
                        x:
                          type: number
                          description: Horizontal position (percentage or pixel value).
                          example: 150
                        y:
                          type: number
                          description: Vertical position (percentage or pixel value).
                          example: 200
                    comments:
                      type: array
                      description: Array of all comments in this thread, ordered by creation time (oldest first).
                      items:
                        type: object
                        required:
                          - commentId
                          - commentBody
                          - userName
                          - userId
                          - edited
                          - createdAt
                          - updatedAt
                        properties:
                          commentId:
                            type: string
                            description: Unique identifier for the comment (MongoDB ObjectId).
                            example: "507f1f77bcf86cd799439014"
                          commentBody:
                            type: string
                            description: The text content of the comment.
                            example: "Please adjust the brightness in this area."
                          userName:
                            type: string
                            description: Name of the user who created the comment.
                            example: "John Doe"
                          userId:
                            type: string
                            description: ID of the user who created the comment.
                            example: "507f1f77bcf86cd799439015"
                          reactions:
                            type: object
                            nullable: true
                            description: |
                              Object containing emoji reactions to this comment. Each key is an emoji ID, and the value contains the emoji data and users who reacted.
                            additionalProperties:
                              type: object
                              properties:
                                native:
                                  type: string
                                  description: Native emoji character.
                                  example: "👍"
                                shortcodes:
                                  type: string
                                  description: Emoji shortcode.
                                  example: ":thumbsup:"
                                users:
                                  type: array
                                  description: Array of users who added this reaction.
                                  items:
                                    type: object
                                    properties:
                                      userName:
                                        type: string
                                        example: "Jane Smith"
                                      userId:
                                        type: string
                                        example: "507f1f77bcf86cd799439016"
                            example:
                              "thumbsup":
                                native: "👍"
                                shortcodes: ":thumbsup:"
                                users:
                                  - userName: "Jane Smith"
                                    userId: "507f1f77bcf86cd799439016"
                          edited:
                            type: boolean
                            description: Whether the comment has been edited after creation.
                            example: false
                          createdAt:
                            type: string
                            format: date-time
                            description: ISO 8601 timestamp when the comment was created.
                            example: "2024-03-20T10:30:00.000Z"
                          updatedAt:
                            type: string
                            format: date-time
                            description: ISO 8601 timestamp when the comment was last updated.
                            example: "2024-03-20T10:30:00.000Z"
                    createdAt:
                      type: string
                      format: date-time
                      description: ISO 8601 timestamp when the thread was created.
                      example: "2024-03-20T10:00:00.000Z"
                    updatedAt:
                      type: string
                      format: date-time
                      description: ISO 8601 timestamp when the thread was last updated.
                      example: "2024-03-20T10:30:00.000Z"
              examples:
                image-annotation:
                  summary: Image annotation thread
                  value:
                    - threadId: "507f1f77bcf86cd799439012"
                      fileId: "507f1f77bcf86cd799439011"
                      versionId: null
                      resolved: false
                      timestamp: null
                      position:
                        x: 150
                        y: 200
                      comments:
                        - commentId: "507f1f77bcf86cd799439014"
                          commentBody: "Please adjust the brightness in this area."
                          userName: "John Doe"
                          userId: "507f1f77bcf86cd799439015"
                          reactions:
                            thumbsup:
                              native: "👍"
                              shortcodes: ":thumbsup:"
                              users:
                                - userName: "Jane Smith"
                                  userId: "507f1f77bcf86cd799439016"
                          edited: false
                          createdAt: "2024-03-20T10:30:00.000Z"
                          updatedAt: "2024-03-20T10:30:00.000Z"
                        - commentId: "507f1f77bcf86cd799439017"
                          commentBody: "Done! Updated the brightness levels."
                          userName: "Jane Smith"
                          userId: "507f1f77bcf86cd799439016"
                          reactions: null
                          edited: false
                          createdAt: "2024-03-20T11:00:00.000Z"
                          updatedAt: "2024-03-20T11:00:00.000Z"
                      createdAt: "2024-03-20T10:00:00.000Z"
                      updatedAt: "2024-03-20T11:00:00.000Z"
                video-comment:
                  summary: Video timestamp comment
                  value:
                    - threadId: "507f1f77bcf86cd799439018"
                      fileId: "507f1f77bcf86cd799439019"
                      versionId: null
                      resolved: true
                      timestamp: 45.5
                      position: null
                      comments:
                        - commentId: "507f1f77bcf86cd799439020"
                          commentBody: "Add a transition effect here."
                          userName: "Director"
                          userId: "507f1f77bcf86cd799439021"
                          reactions: null
                          edited: false
                          createdAt: "2024-03-20T09:00:00.000Z"
                          updatedAt: "2024-03-20T09:00:00.000Z"
                      createdAt: "2024-03-20T09:00:00.000Z"
                      updatedAt: "2024-03-20T09:00:00.000Z"
                no-threads:
                  summary: No threads (empty response)
                  value: []
        "400":
          description: Invalid file ID format.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Your request contains invalid ID parameter."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Forbidden. User is not allowed to view threads for this file. This occurs when:
            - A restricted user lacks READ access to the file (checked via ACL permissions).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User is not allowed to perform the requested operation."
        "404":
          description: File not found with the specified ID.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "The requested asset does not exist."
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
  /api/clients/{clientNumber}/path-policy:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Path Policies
      operationId: list-path-policies
      summary: List path policies
      description: |
        Returns all path policies for the account, sorted by last updated (newest first). Path policies enforce rules on specific folder paths — such as required custom metadata fields, validation functions that reject non-compliant uploads, and upload transform functions that modify files during ingestion.

        **Two modes:**
        - **Without `folderPath`:** Returns all path policies (summary view, no function code or full metadata).
        - **With `folderPath`:** Returns the single nearest ancestor policy that applies to that path (hierarchical lookup), along with its merged custom metadata fields. This is useful to check what rules apply before uploading to a specific folder.

        **When to use:** Discover which upload rules and metadata requirements are enforced on specific folders, or list all policies for management purposes.

        **Permission:** Requires `SELF_MEDIA_LIBRARY_VIEW` permission.
        **Feature gate:** The `PATH_POLICY` feature must be enabled on the account's pricing plan.
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
        - in: query
          name: folderPath
          required: false
          schema:
            type: string
          description: |
            Optional folder path to look up the applicable policy for a specific location.
            When provided, the response includes at most one policy — the nearest ancestor —
            with `inheritedFrom` and merged `customMetadataFields`.
          example: "/products/images"
      responses:
        "200":
          description: Successfully retrieved path policies.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PathPolicyListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
    post:
      tags:
        - Digital Asset Management (DAM)
        - Path Policies
      operationId: create-path-policy
      summary: Create path policy
      description: |
        Creates a new path policy that enforces rules on uploads to specific folder paths. A path policy can:
        - **Require custom metadata fields** — make certain metadata mandatory for all uploads to the governed folders.
        - **Run a validate function** — JavaScript code that runs before upload and can reject non-compliant files (e.g., enforce naming conventions, minimum dimensions).
        - **Run an upload transform function** — JavaScript code that modifies the upload payload (e.g., auto-set metadata based on folder path).
        - **Set read-only defaults** — lock metadata fields to specific values that uploaders cannot change.

        **When to use:** Enforce governance on media uploads — for example, require a `brand` and `campaign` field on all files uploaded to `/marketing/`, or validate that product images meet minimum resolution requirements.

        **Constraints:**
        - Policy `name` must be unique per account (1–150 chars).
        - `folderPaths` must not overlap with any other policy's folder paths. Root path `"/"` is not allowed.
        - Each `customMetadataFields[].name` must reference an existing global custom metadata field and `type` must match.
        - When `uploadFunctionEnabled` is `true`, `uploadFunction` code is required and will be compiled.
        - When `validateFunctionEnabled` is `true`, `validateFunction` code is required and will be compiled.
        - If a field is marked `readOnly`, a `defaultValue` must be provided.

        **Permission:** Requires `SELF_MEDIA_LIBRARY_MANAGE` permission.
        **Feature gate:** The `PATH_POLICY` feature must be enabled on the account's pricing plan.
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePathPolicyRequest"
      responses:
        "200":
          description: Path policy created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathPolicySaved"
        "400":
          description: |
            Bad request. Possible causes:
            - Missing or invalid required fields
            - Function compilation failed
            - Custom metadata field does not exist or type mismatch
            - `defaultValue` missing for a `readOnly` field
            - Root path "/" not allowed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Validate Function is required when enabled."
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            Conflict. A policy with the same name already exists, or one or more folder paths
            are already governed by another policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "One or more folder paths already have another path policy enforced."
                  duplicateFolderPaths:
                    type: array
                    items:
                      type: string
                    description: The folder paths that conflict with an existing policy.
                    example: ["/products"]
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
  /api/clients/{clientNumber}/path-policy/{policyId}:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Path Policies
      operationId: get-path-policy-details
      summary: Get path policy details
      description: |
        Returns the full details of a single path policy, including its validate/upload function source code, all governed folder paths, and the complete set of custom metadata fields (both selected and unselected) with policy-level overrides merged in.

        **Response includes:**
        - `folderPaths` — all folder paths this policy governs
        - `validateFunction` / `uploadFunction` — the JavaScript source code (if enabled)
        - `customMetadataFields` — every global custom metadata field, each with `isSelected: true/false` indicating whether this policy enforces it, plus any overrides (`isValueRequired`, `readOnly`, `defaultValue`)

        **When to use:** Inspect the full configuration of a policy — e.g., to review its validation logic, see which metadata fields are enforced, or before updating it.

        **Permission:** Requires `SELF_MEDIA_LIBRARY_VIEW` permission.
        **Feature gate:** The `PATH_POLICY` feature must be enabled on the account's pricing plan.
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
        - in: path
          name: policyId
          required: true
          schema:
            type: string
          description: The unique ID of the path policy (MongoDB ObjectId).
          example: "69bcb3f235655d5fff17f5a1"
      responses:
        "200":
          description: Successfully retrieved path policy details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathPolicyDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Path policy not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Path policy not found."
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
    put:
      tags:
        - Digital Asset Management (DAM)
        - Path Policies
      operationId: update-path-policy
      summary: Update path policy
      description: |
        Updates an existing path policy. Supports two mutually exclusive modes:

        **Mode 1 — Incremental folder path update (add/remove one path at a time):**
        Provide `addFolderPath` or `removeFolderPath` (not both). No other fields are allowed in the same request. Use this when you just need to extend or shrink the policy's scope without changing its rules.

        **Mode 2 — Full/partial update (modify policy rules):**
        Provide any combination of `name`, `description`, `folderPaths`, function fields, and `customMetadataFields`. Only the provided fields are updated; omitted fields remain unchanged. Set a function to empty string `""` to clear/delete it.

        **When to use:** Modify a policy's validation logic, change enforced metadata fields, rename it, or adjust which folders it governs.

        **Constraints:**
        - Policy `name` must remain unique per account.
        - `folderPaths` must not overlap with other policies. Root path `"/"` is not allowed.
        - Custom metadata field validations same as create.

        **Permission:** Requires `SELF_MEDIA_LIBRARY_MANAGE` permission.
        **Feature gate:** The `PATH_POLICY` feature must be enabled on the account's pricing plan.
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
        - in: path
          name: policyId
          required: true
          schema:
            type: string
          description: The unique ID of the path policy to update (MongoDB ObjectId).
          example: "69bcb3f235655d5fff17f5a1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePathPolicyRequest"
      responses:
        "200":
          description: Path policy updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathPolicySaved"
        "400":
          description: |
            Bad request. Possible causes:
            - `addFolderPath` and `removeFolderPath` both present
            - Function compilation failed
            - Custom metadata field validation errors
            - Root path "/" not allowed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "addFolderPath and removeFolderPath cannot be present in the same request."
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Path policy not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Path policy not found."
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "409":
          description: |
            Conflict. Policy name already taken or folder paths overlap with another policy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Folder already has another path policy enforced."
                  duplicateFolderPaths:
                    type: array
                    items:
                      type: string
                    example: ["/products/new"]
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
    delete:
      tags:
        - Digital Asset Management (DAM)
        - Path Policies
      operationId: delete-path-policy
      summary: Delete path policy
      description: |
        Permanently deletes a path policy and removes its associated validate/upload function code from storage. After deletion, the governed folder paths will no longer have any upload restrictions or metadata requirements enforced. This action cannot be undone.

        **When to use:** Remove a policy when the governance rules are no longer needed for those folders.

        **Permission:** Requires `SELF_MEDIA_LIBRARY_MANAGE` permission.
        **Feature gate:** The `PATH_POLICY` feature must be enabled on the account's pricing plan.
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
        - in: path
          name: policyId
          required: true
          schema:
            type: string
          description: The unique ID of the path policy to delete (MongoDB ObjectId).
          example: "69bcb3f235655d5fff17f5a1"
      responses:
        "200":
          description: Path policy deleted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePathPolicyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Path policy not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Path policy not found."
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
  /api/v1/download:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Download
      operationId: list-download-jobs
      summary: List download jobs
      description: |
        List all download archive jobs for the account, including their status and archive URLs. Jobs are automatically deleted after 7 days.

        **When to use:** Check the status of previously created download archives, or find the download URL for a completed archive. To create a new download archive, use `create-download-job`. To check a specific job, use `get-download-job-status` with the `jobId`.
      responses:
        "200":
          description: List of download jobs.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    jobId:
                      type: string
                      description: Unique identifier of the download job.
                    status:
                      type: string
                      description: Current status of the download job.
                      enum:
                        - Succeeded
                        - Partially succeeded
                        - Pending
                        - Failed
                    name:
                      type: string
                      description: Name of the download archive (e.g. `ik-download-1643555271`).
                    fileCount:
                      type: number
                      description: Number of files included in the download.
                    folderCount:
                      type: number
                      description: Number of folders included in the download.
                    sizeOfContents:
                      type: number
                      description: Total size of the contents in bytes (before compression).
                    compressedSize:
                      type: number
                      description: Size of the compressed archive in bytes. Present when the archive has been created (`Succeeded` or `Partially succeeded`), may be absent for `Pending` or `Failed` jobs.
                    storageURL:
                      type: string
                      description: URL to download the archive. Only present when status is `Succeeded` or `Partially succeeded`.
                    publicLinkId:
                      type: string
                      description: Public link ID if the download was initiated via a public link.
                    updatedAt:
                      type: string
                      format: date-time
                      description: ISO 8601 timestamp when the job was last updated.
              example:
                - jobId: "63d5e3c7a1b2c3d4e5f60001"
                  status: Succeeded
                  name: "ik-download-1643555271"
                  fileCount: 4
                  folderCount: 0
                  sizeOfContents: 8097
                  compressedSize: 7401
                  storageURL: "https://download-storage.imagekit.io/ik-download-1643555271.zip"
                  updatedAt: "2026-03-18T10:30:00.000Z"
                - jobId: "63d5e3c7a1b2c3d4e5f60002"
                  status: Pending
                  name: "ik-download-1643555272"
                  fileCount: 10
                  folderCount: 2
                  sizeOfContents: 50000
                  updatedAt: "2026-03-19T14:00:00.000Z"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Digital Asset Management (DAM)
        - Download
      operationId: create-download-job
      summary: Create download archive
      description: |
        Creates a new download archive job for the specified files and/or folders. The archive is created asynchronously — poll the job status using the `get-download-job-status` endpoint.

        **Limits:**
        - Maximum 300 items (files + folders combined) per request.
        - Maximum total file size of 10 GB.
        - Download archives are automatically deleted after 7 days.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              additionalProperties: false
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 300
                  items:
                    type: string
                  description: |
                    Array of file IDs, folder IDs, or media collection IDs to include in the download archive.
                transformations:
                  type: array
                  items:
                    type: object
                    description: |
                      An object with ImageKit short-form transformation parameters as keys. These are the same
                      parameters used in ImageKit URL transformations (the `tr:` query string). Common keys include:
                      - `w` — Width in pixels (string or number). Capped to actual file width if larger.
                      - `h` — Height in pixels (string or number). Capped to actual file height if larger.
                      - `ar` — Aspect ratio (e.g. `"4-3"`)
                      - `c` — Crop mode (e.g. `"maintain_ratio"`, `"force"`, `"at_max"`)
                      - `cm` — Crop mode (e.g. `"extract"`, `"pad_resize"`)
                      - `fo` — Focus (e.g. `"center"`, `"auto"`)
                      - `bl` — Blur (1–100)
                      - `r` — Radius for rounded corners
                      - `rt` — Rotation angle in degrees
                      - `t` — Trim edges
                      - `e-grayscale` — Grayscale effect
                      - `e-sharpen` — Sharpen effect

                      **Note:** `format` and `quality` keys are ignored — the system overrides them internally
                      (`f-orig` and `q-95` for images with transforms, `q-100` for images without).

                      **Behavior by file type:**
                      - **Images:** Transformations are applied. If requested `h`/`w` exceeds actual dimensions, they are capped.
                      - **Videos:** Transformations are ignored; the original video is downloaded.
                      - **Static files** (PDFs, etc.): Transformations are ignored; the original file is downloaded.

                      Multiple objects in the array represent [chained transformations](https://imagekit.io/docs/transformations#chained-transformations).
                    additionalProperties: true
                  description: |
                    Optional array of transformation objects to apply to image files before archiving.
                    Each object contains ImageKit short-form transformation keys (e.g. `w`, `h`, `ar`, `c`).
                    Transformations only apply to image files — videos and static files are downloaded as originals.
            examples:
              withoutTransformations:
                summary: Download without transformations
                value:
                  items:
                    - "65c9b94188c257da33c0d377"
                    - "65c9b94088c257da33c0cfb8"
                    - "65c9b94088c257da33c0cde9"
                  transformations: []
              withTransformations:
                summary: Download with resize transformations
                value:
                  items:
                    - "69a023885c7cd75eb818e34a"
                    - "698472e15c7cd75eb82781b3"
                    - "6963e2fd5c7cd75eb8c0394c"
                    - "6963d6835c7cd75eb8794ae3"
                  transformations:
                    - w: "1104"
                      h: "736"
      responses:
        "200":
          description: Download job created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Unique identifier of the created download job.
                  name:
                    type: string
                    description: Name of the download archive.
                  status:
                    type: string
                    description: Initial status of the job.
                    enum:
                      - Pending
              example:
                jobId: "63d5e3c7a1b2c3d4e5f60001"
                name: "ik-download-1643555271"
                status: Pending
        "400":
          description: |
            Invalid request. Possible reasons:
            - Missing or invalid `items` parameter
            - Total items exceed the allowed limit of 300
            - Total file size exceeds the allowed limit
            - Invalid item selection
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  help:
                    type: string
              examples:
                missingItems:
                  value:
                    message: "Your request is missing 'items' parameter."
                    help: "For support kindly contact us at support@imagekit.io ."
                tooManyItems:
                  value:
                    message: "Total items are more than allowed limit of 300."
                    help: "For support kindly contact us at support@imagekit.io ."
                sizeLimitExceeded:
                  value:
                    message: "Total size of the contents exceeds the allowed limit."
                    help: "For support kindly contact us at support@imagekit.io ."
        "404":
          description: One or more items were not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  help:
                    type: string
                  missingItems:
                    type: array
                    items:
                      type: string
                    description: Array of item IDs that were not found.
              example:
                message: "The requested item(s) do not exist."
                help: "For support kindly contact us at support@imagekit.io ."
                missingItems:
                  - "63d5e3c7a1b2c3d4e5f60099"
        "403":
          description: User does not have required permission to download the requested assets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User is not allowed to perform the requested operation, it does not have READ access to the asset(s)"
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/download/{jobId}:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Download
      operationId: get-download-job-status
      summary: Get download job status
      description: |
        Check the status of a specific download archive job. When the job has succeeded, the response includes a `storageURL` to download the ZIP archive.

        **When to use:** Poll this endpoint after calling `create-download-job` to check when the archive is ready. The `jobId` is returned by the create endpoint.

        **Statuses:** `Pending` (still creating archive), `Succeeded` (ready — `storageURL` included), `Partially succeeded` (some files failed — `storageURL` still included), `Failed` (archive creation failed).
      parameters:
        - name: jobId
          in: path
          required: true
          description: Unique identifier of the download job (MongoDB ObjectId).
          schema:
            type: string
      responses:
        "200":
          description: |
            Download job details. The response shape varies based on the job status:
            - **Succeeded / Partially succeeded**: includes `fileCount`, `folderCount`, `sizeOfContents`, `compressedSize`, and `storageURL`.
            - **Pending / Failed**: includes only `jobId`, `status`, and `name`.
          content:
            application/json:
              schema:
                type: object
                required:
                  - jobId
                  - status
                  - name
                properties:
                  jobId:
                    type: string
                    description: Unique identifier of the download job.
                  status:
                    type: string
                    description: Current status of the download job.
                    enum:
                      - Succeeded
                      - Partially succeeded
                      - Pending
                      - Failed
                  name:
                    type: string
                    description: Name of the download archive.
                  fileCount:
                    type: number
                    description: Number of files in the download. Present only when status is `Succeeded` or `Partially succeeded`.
                  folderCount:
                    type: number
                    description: Number of folders in the download. Present only when status is `Succeeded` or `Partially succeeded`.
                  sizeOfContents:
                    type: number
                    description: Total size of contents in bytes (before compression). Present only when status is `Succeeded` or `Partially succeeded`.
                  compressedSize:
                    type: number
                    description: Size of compressed archive in bytes. Present only when status is `Succeeded` or `Partially succeeded`.
                  storageURL:
                    type: string
                    description: URL to download the archive. Present only when status is `Succeeded` or `Partially succeeded`.
              examples:
                succeeded:
                  summary: Succeeded job
                  value:
                    jobId: "63d5e3c7a1b2c3d4e5f60001"
                    status: Succeeded
                    name: "ik-download-1643555271"
                    fileCount: 4
                    folderCount: 0
                    sizeOfContents: 8097
                    compressedSize: 7401
                    storageURL: "https://download-storage.imagekit.io/ik-download-1643555271.zip"
                pending:
                  summary: Pending job
                  value:
                    jobId: "63d5e3c7a1b2c3d4e5f60001"
                    status: Pending
                    name: "ik-download-1643555271"
        "404":
          description: The requested download job does not exist.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "The requested job does not exist."
                  help:
                    type: string
                    example: "For support kindly contact us at support@imagekit.io ."
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/files/purge:
    post:
      tags:
        - Caching
      operationId: purge-cache
      summary: Purge cache
      description: |
        Purges both CDN and ImageKit's internal cache for a specific file URL. After purging, the next request for that URL will fetch the latest version from the origin/media library instead of serving a cached copy.

        **When to use:**
        - After updating a file (e.g., replacing an image) when you want the change to reflect immediately on the CDN
        - After renaming or moving a file to clear stale cached URLs
        - Note: Deleting a file does NOT automatically purge the CDN cache

        **Important:** This is an asynchronous operation. Use `purge-status` with the returned `requestId` to check when the purge completes. Purge requests count against your monthly purge quota.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  description: |
                    The full URL of the file to be purged.
                  example: https://ik.imagekit.io/your_imagekit_id/default-image.jpg
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "201":
          description: Purge request submitted successfully. A `requestId` will be returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                    description: |
                      Unique identifier of the purge request. This can be used to check the status of the purge request.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The URL is not valid for cache purging.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v1/files/purge/{requestId}:
    get:
      tags:
        - Caching
      operationId: purge-status
      summary: Get purge status
      description: |
        Returns the current status of a cache purge request. Status will be either `Pending` (still processing) or `Completed` (cache has been cleared).

        **When to use:** Poll this endpoint after calling `purge-cache` to confirm when the cache has been fully cleared. The `requestId` parameter is returned by the `purge-cache` API.
      parameters:
        - description: |
            Should be a valid requestId.
          in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: |
            On success, you will receive the status of the purge request in the response body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: Completed
                    enum:
                      - Pending
                      - Completed
                    description: |
                      Status of the purge request.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: No request found for this requestId.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v1/files/{fileId}/metadata:
    get:
      tags:
        - File Metadata
      operationId: get-uploaded-file-metadata
      summary: Get uploaded file metadata
      description: |
        Returns technical metadata for an uploaded file in the media library, including EXIF data (camera info, GPS coordinates, exposure settings), perceptual hash (pHash) for image similarity comparison, and format/quality details.

        **When to use:**
        - Retrieve EXIF data such as camera model, GPS location, or creation date
        - Compare image similarity using the `pHash` value (similar images have similar pHash values)
        - Check image dimensions, format, color profile, and transparency
        - For video files: get codec, bitrate, and duration information

        **Tip:** You can also get metadata at upload time by passing `metadata` in the `responseFields` parameter of the upload API.
      parameters:
        - description: |
            The unique `fileId` of the uploaded file. `fileId` is returned in the list and search assets API and upload API.
          in: path
          name: fileId
          required: true
          schema:
            type: string
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: File metadata object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Metadata"
              examples:
                Image:
                  value:
                    $ref: "#/components/examples/ImageMetadata"
                Video:
                  value:
                    $ref: "#/components/examples/VideoMetadata"
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested file does not exist or is inaccessible at this time.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested file is corrupt or invalid.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v1/metadata:
    get:
      tags:
        - File Metadata
      operationId: get-metadata-from-url
      summary: Get metadata from remote URL
      description: |
        Returns technical metadata (EXIF, pHash, dimensions, format) for a file accessible via an ImageKit URL. Unlike `get-uploaded-file-metadata` which takes a `fileId`, this endpoint works with any URL served through your ImageKit account.

        **When to use:** Inspect metadata for a file when you only have its delivery URL (not its `fileId`). The URL must be accessible through your ImageKit.io account.
      parameters:
