      description: >
        **Note:** This API is currently in beta.

        Returns all URL-endpoints configured for the account, including the default endpoint created during account setup. A URL-endpoint is the base URL (e.g., `https://ik.imagekit.io/your_id/`) through which files are accessed. Each endpoint can be linked to one or more origins (fallback storage sources) that ImageKit checks when a file is not in the Media Library.

        **When to use:** List all URL-endpoints to see your file delivery configuration, or to find endpoint IDs before updating/deleting them.
