                    example: For support kindly contact us at support@imagekit.io.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Asset or public link not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Asset not found
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
    put:
      tags:
        - Digital Asset Management (DAM)
        - Public Links
      operationId: update-public-link
      summary: Update public link
      description: |
        This API updates an existing public link's settings including validity dates, password, and draft asset exposure.
        
        **Permission:** Requires `MANAGE` permission on the asset for restricted users.
        
        **Important Notes:**
        - To remove optional fields (validFrom, validTill, password), omit them from the request body
        - Date validation ensures validFrom cannot be earlier than current date or previously set date
        - Date validation ensures validTill cannot be earlier than current date or previously set date
        - exposeDraftAssets can only be set to true for folders and media collections, not files
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
        - in: path
          name: assetId
          required: true
          description: |
            The unique ID of the asset (file, folder, or media collection).
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
        - in: path
          name: linkId
          required: true
          description: |
            The unique ID of the public link to update. This should be a valid MongoDB ObjectId format.
          schema:
            type: string
            example: "507f1f77bcf86cd799439012"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicLinkRequest"
      responses:
        "200":
          description: Public link updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicLinkResponse"
        "400":
          description: |
            Bad request. Possible reasons:
            - Invalid assetId or linkId format
            - Invalid date format for validFrom or validTill
            - validFrom date is greater than validTill date
            - validFrom or validTill date is earlier than current/previously set date
            - exposeDraftAssets set to true for a file
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Start date for validity cannot be greater than the end date.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Asset or public link not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Asset not found
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
    delete:
