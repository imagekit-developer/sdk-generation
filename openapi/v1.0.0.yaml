        **Note:** This API is currently in beta.

        Creates a new URL-endpoint for serving files. Each URL-endpoint has a `urlPrefix` (the path segment appended to your ImageKit base URL) and an ordered list of origin IDs that ImageKit falls back to when a file is not in the Media Library. Optionally configure URL rewriting for migration from Cloudinary, Imgix, or Akamai.

