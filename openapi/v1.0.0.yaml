  /api/media-library/{clientNumber}/assets/{assetId}/public-links:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Public Links
      operationId: list-public-links
      summary: List public links for an asset
      description: |
        This API returns all public links associated with a specific asset (file, folder, or media collection).
        
        **Permission:** Requires `MANAGE` permission on the asset for restricted users.
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
        - in: path
          name: assetId
          required: true
          description: |
            The unique ID of the asset (file, folder, or media collection) for which to list public links. This should be a valid MongoDB ObjectId format.
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: Array of public link objects for the specified asset.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicLink"
        "400":
          description: Bad request. Invalid assetId format.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid assetId format
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Asset not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Asset not found
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
    post:
      tags:
        - Digital Asset Management (DAM)
        - Public Links
      operationId: create-public-link
      summary: Create public link for an asset
      description: |
        This API creates a new public link for sharing an asset (file, folder, or media collection) externally. Public links allow you to share content with people who don't have access to your ImageKit account.
        
        **Permission:** Requires `MANAGE` permission on the asset for restricted users.
        
        **Limits:**
        - Maximum number of public links per account depends on your pricing plan
        - Maximum 10 public links per asset
        
        **Features:**
        - Password protection: Optionally require a password to access the shared content
        - Time-based validity: Set start and end dates for link validity
        - Draft asset exposure: For folders and media collections, optionally expose unpublished/draft assets
      parameters:
        - $ref: "#/components/parameters/ClientNumber"
        - in: path
          name: assetId
          required: true
          description: |
            The unique ID of the asset (file, folder, or media collection) for which to create a public link. This should be a valid MongoDB ObjectId format.
          schema:
            type: string
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicLinkRequest"
      responses:
        "200":
          description: Public link created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicLinkResponse"
        "400":
          description: |
            Bad request. Possible reasons:
            - Invalid assetId format
            - Invalid date format for validFrom or validTill
            - validFrom date is greater than validTill date
            - validFrom or validTill date is earlier than current/previously set date
            - exposeDraftAssets set to true for a file (only valid for folders and media collections)
            - Limit for public links exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Start date for validity cannot be greater than the end date.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Asset not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Asset not found
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
  /api/media-library/{clientNumber}/assets/{assetId}/public-links/{linkId}:
    get:
      tags:
