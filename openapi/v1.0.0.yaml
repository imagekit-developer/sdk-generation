  /api/v2/media-collections/{mediaCollectionId}:
    patch:
      tags:
        - Digital Asset Management (DAM)
        - Media Collections
      operationId: update-media-collection
      summary: Update media collection
      description: |
        Update a media collection's **name and/or access permissions (ACL)**. At least one of `name` or `acl` must be provided. Does not change custom metadata.

        **When to use:** Rename a collection or change who can access it (add/remove users and groups with READ, CONTRIBUTE, or MANAGE permissions). To update **custom metadata fields** instead, use `update-media-collection-details`.

        **Permission:** Requires `MANAGE` permission on the media collection.
      parameters:
        - in: path
          name: mediaCollectionId
          required: true
          description: |
            The unique ID of the media collection (MongoDB ObjectId format).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  pattern: "^(?!.*/).*$"
                  description: |
                    New name for the media collection. Cannot contain slashes.
                  example: updated-collection-name
                acl:
                  type: object
                  description: |
                    Access control list updates.
                  properties:
                    addOrModify:
                      type: array
                      maxItems: 50
                      description: |
                        Array of ACL entries to add or modify permissions.
                      items:
                        type: object
                        required:
                          - entity
                          - permission
                        properties:
                          entity:
                            type: object
                            required:
                              - id
                              - type
                            properties:
                              id:
                                type: string
                                description: User or user group ID.
                              type:
                                type: string
                                enum:
                                  - USER
                                  - USER_GROUP
                                description: Type of entity.
                          permission:
                            type: string
                            enum:
                              - READ
                              - CONTRIBUTE
                              - MANAGE
                            description: Permission level to grant.
                    remove:
                      type: array
                      description: |
                        Array of entities to remove from ACL.
                      items:
                        type: object
                        required:
                          - entity
                        properties:
                          entity:
                            type: object
                            required:
                              - id
                              - type
                            properties:
                              id:
                                type: string
                                description: User or user group ID.
                              type:
                                type: string
                                enum:
                                  - USER
                                  - USER_GROUP
                                description: Type of entity.
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: Media collection updated successfully.
          content:
            application/json:
              schema:
                type: object
                x-stainless-empty-object: true
        "404":
          description: Media collection or user/group not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Media collection not found.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Multiple entries found for the same entity in 'acl.addOrModify' array.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
    delete:
      tags:
        - Digital Asset Management (DAM)
        - Media Collections
      operationId: delete-media-collection
      summary: Delete media collection
      description: |
        Permanently delete a media collection. The assets inside the collection are **not deleted** — they remain in the media library. Only the collection grouping is removed. This cannot be undone.

        **When to use:** Remove a collection that is no longer needed. To remove specific assets from a collection without deleting the collection itself, use `remove-assets-from-media-collections`.
      parameters:
        - in: path
          name: mediaCollectionId
          required: true
          description: |
            The unique ID of the media collection (MongoDB ObjectId format).
          schema:
            type: string
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "204":
          description: Media collection deleted successfully.
        "404":
          description: Media collection not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Media collection not found.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Parameter 'mediaCollectionId' must be a valid Id.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v2/media-collections/add-assets:
    post:
      tags:
        - Digital Asset Management (DAM)
        - Media Collections
      operationId: add-assets-to-media-collections
      summary: Add assets to media collections
      description: |
        Adds files to one or more media collections in a single bulk request. Media collections are curated groups of assets (like albums or boards) used to organize files independently of their folder structure.

        **When to use:** Organize files into collections for campaigns, projects, or themes — e.g., add product images to a "Summer Campaign 2024" collection. A single file can belong to multiple collections.

        **Limits:** Maximum 100 assets and 10 media collections per request. Returns partial success (207) if some additions fail (e.g., asset already in collection or association limit exceeded).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mediaCollectionIds
                - assetIds
              properties:
                mediaCollectionIds:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items:
                    type: string
                  description: |
                    Array of media collection IDs to add assets to.
                  example: ["507f1f77bcf86cd799439011", "507f1f77bcf86cd799439012"]
                assetIds:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                  description: |
                    Array of asset (file) IDs to add to the collections.
                  example: ["598821f949c0a938d57563bd", "598821f949c0a938d57563be"]
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: Assets added successfully to all collections.
          content:
            application/json:
              schema:
                type: object
                x-stainless-empty-object: true
        "207":
          description: Partial success. Some operations failed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Some operations failed.
                  successfulOperations:
                    type: array
                    items:
                      type: object
                      properties:
                        mediaCollectionId:
                          type: string
                        assetId:
                          type: string
                  failedOperations:
                    type: array
                    items:
                      type: object
                      properties:
                        mediaCollectionId:
                          type: string
                        assetId:
                          type: string
                        error:
                          type: string
        "404":
          description: Media collection or assets not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Media collection not found.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Association limit exceeded for some assets.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v2/media-collections/remove-assets:
    post:
      tags:
        - Digital Asset Management (DAM)
        - Media Collections
      operationId: remove-assets-from-media-collections
      summary: Remove assets from media collections
      description: |
        Removes files from one or more media collections in a single bulk request. This only removes the association between assets and collections — the files themselves are not deleted and remain in the media library.

        **When to use:** Remove assets that no longer belong to a collection — e.g., remove discontinued products from a "Current Catalog" collection. The files remain accessible in their original folder locations.

        **Limits:** Maximum 100 assets and 10 media collections per request. Returns partial success (207) if some removals fail.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mediaCollectionIds
                - assetIds
              properties:
                mediaCollectionIds:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items:
                    type: string
                  description: |
                    Array of media collection IDs to remove assets from.
                  example: ["507f1f77bcf86cd799439011", "507f1f77bcf86cd799439012"]
                assetIds:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                  description: |
                    Array of asset (file) IDs to remove from the collections.
                  example: ["598821f949c0a938d57563bd", "598821f949c0a938d57563be"]
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: Assets removed successfully from all collections.
          content:
            application/json:
              schema:
                type: object
                x-stainless-empty-object: true
        "207":
          description: Partial success. Some operations failed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Some operations failed.
                  successfulOperations:
                    type: array
                    items:
                      type: object
                      properties:
                        mediaCollectionId:
                          type: string
                        assetId:
                          type: string
                  failedOperations:
                    type: array
                    items:
                      type: object
                      properties:
                        mediaCollectionId:
                          type: string
                        assetId:
                          type: string
                        error:
                          type: string
        "404":
          description: Media collection or assets not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Media collection not found.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid parameters.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v2/media-collections/{mediaCollectionId}/access-list:
