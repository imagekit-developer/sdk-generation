  /api/v2/folder:
    post:
      tags:
        - Digital Asset Management (DAM)
        - Managing folders
      operationId: create-folder
      summary: Create folder
      description: |
        Create a new folder at a specified location in the media library. Any missing parent folders in the path are created automatically.

        **When to use:** Organize assets into folders before uploading files. If you upload a file with a folder path that doesn't exist, the folder is created automatically during upload — so explicit folder creation is only needed when you want to create empty folders in advance.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - folderName
                - parentFolderPath
              properties:
                folderName:
                  type: string
                  description: |
                    The folder will be created with this name. 

                    All characters except alphabets and numbers (inclusive of unicode letters, marks, and numerals in other languages) will be replaced by an underscore i.e. `_`.
                parentFolderPath:
                  type: string
                  description: |
                    The folder where the new folder should be created, for root use `/` else the path e.g. `containing/folder/`.

                    Note: If any folder(s) is not present in the parentFolderPath parameter, it will be automatically created. For example, if you pass `/product/images/summer`, then `product`, `images`, and `summer` folders will be created if they don't already exist.
            example:
              folderName: summer
              parentFolderPath: /product/images/
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "201":
          description: Folder created successfully.
          content:
            application/json:
              schema:
                type: object
                x-stainless-empty-object: true
        "400":
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reason:
                    type: string
                    example: INVALID_FOLDER_PATH
                  message:
                    type: string
                    example: "'.' & '..' can not be used as folder-name"
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
    delete:
      tags:
        - Digital Asset Management (DAM)
        - Managing folders
      operationId: delete-folder
      summary: Delete folder
      description: |
        Permanently deletes a folder and all its contents (nested files, subfolders, and their file versions). This operation cannot be undone.

        **When to use:** Remove an entire folder tree when you no longer need the assets. Note: The API will fail if the folder contains more than 100,000 nested items.

        **Important:** This does not purge CDN cache for files that were in the folder. Use `purge-cache` separately if needed.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - folderPath
              properties:
                folderPath:
                  type: string
                  description: |
                    Full path to the folder you want to delete. For example `/folder/to/delete/`.
            example:
              folderPath: /folder/to/delete/
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "204":
          description: Folder deleted successfully.
          content:
            application/json:
              schema:
                type: object
                x-stainless-empty-object: true
        "404":
          description: Folder not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  reason:
                    type: string
                    example: FOLDER_NOT_FOUND
                  message:
                    type: string
                    example: No folder found with folderPath `/folder/to/delete/`.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "400":
          description: Bad Request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reason:
                    type: string
                    example: TOO_MANY_OBJECTS
                  message:
                    type: string
                    example: Total nested assets (files, folders and file versions) are more than allowed limit of 100000 items.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v2/bulkJobs:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Managing folders
      operationId: list-bulk-jobs
      summary: List bulk jobs
      description: |
        List all asynchronous bulk folder operations (copy, move, rename) for the account. Only jobs from the last 30 days are returned, sorted newest first.

        **When to use:** View the history and status of folder operations. Use the `status` filter to find in-progress or failed jobs. To check a specific job, use `bulk-job-status` with the `jobId` instead.
      parameters:
        - name: status
          in: query
          required: false
          description: |
            Filter jobs by status. Provide a comma-separated list of statuses.
          schema:
            type: string
          example: "INITIATED,PROCESSING"
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of jobs to return. Defaults to `100` if not provided.
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: |
            List of bulk jobs matching the query filters.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                      description: Unique identifier of the bulk job.
                    clientNumber:
                      type: string
                      description: Client account number the job belongs to.
                    userId:
                      type: string
                      description: User ID of the user who created the job. Present for restricted user accounts.
                    type:
                      type: string
                      description: Type of the bulk job.
                      enum:
                        - COPY_FOLDER
                        - MOVE_FOLDER
                        - RENAME_FOLDER
                    status:
                      type: string
                      description: Current status of the bulk job.
                      enum:
                        - INITIATED
                        - PROCESSING
                        - PARTIAL_SUCCESS
                        - SUCCESS
                    purgeRequestId:
                      type: string
                      description: |
                        Unique identifier of the purge request. Present only when `purgeCache` was set to `true` in a rename folder request.
                    message:
                      type: string
                      description: Status message or error detail for the job.
                    jobData:
                      type: object
                      description: |
                        Job-specific data. Shape depends on the job type:
                        - **COPY_FOLDER**: `{ sourceFolderPath, destinationPath, includeFileVersions }`
                        - **MOVE_FOLDER**: `{ sourceFolderPath, destinationPath }`
                        - **RENAME_FOLDER**: `{ folderPath, newFolderName, purgeCache }`
                    createdAt:
                      type: string
                      format: date-time
                      description: ISO 8601 timestamp when the job was created.
              example:
                - _id: "5d5b1a9b4c8c4c0001f3e4a2"
                  clientNumber: "12345"
                  type: COPY_FOLDER
                  status: SUCCESS
                  jobData:
                    sourceFolderPath: "/marketing/old-campaign"
                    destinationPath: "/marketing/archive/"
                    includeFileVersions: true
                  createdAt: "2026-03-18T10:30:00.000Z"
                - _id: "5d5b1a9b4c8c4c0001f3e4a3"
                  clientNumber: "12345"
                  type: RENAME_FOLDER
                  status: PROCESSING
                  jobData:
                    folderPath: "/products/images"
                    newFolderName: "product-images"
                    purgeCache: true
                  createdAt: "2026-03-19T14:00:00.000Z"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid status
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v2/bulkJobs/copyFolder:
    post:
      tags:
        - Digital Asset Management (DAM)
        - Managing folders
      operationId: copy-folder
      summary: Copy folder
      description: |
        Copy a folder and all its contents (nested files, subfolders) to another location. This is an **async operation** — returns a `jobId` immediately. Poll `bulk-job-status` to check completion.

        **When to use:** Duplicate an entire folder tree to a new location while keeping the original intact. To copy a single file, use `copy-file` instead.

        **Behavior:** If a file at the destination has the same name as a source file, the source file's versions are appended to the destination file's version history. Set `includeVersions=true` to copy all file versions (default: only current version).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - sourceFolderPath
                - destinationPath
              properties:
                sourceFolderPath:
                  type: string
                  description: |
                    The full path to the source folder you want to copy.
                  example: /path/of/source/folder
                destinationPath:
                  type: string
                  description: |
                    Full path to the destination folder where you want to copy the source folder into.
                  example: /path/of/destination/folder
                includeVersions:
                  type: boolean
                  description: |
                    Option to copy all versions of files that are nested inside the selected folder. By default, only the current version of each file will be copied. When set to true, all versions of each file will be copied. Default value - `false`.
                  example: true
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "404":
          description: Folder not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  reason:
                    type: string
                    example: NO_FILES_FOLDER
                  message:
                    type: string
                    example: No files & folder found at sourceFolderPath `/folder/to/copy`.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: sourceFolderPath and destinationPath is same
                  reason:
                    type: string
                    examples:
                      - MISSING_PARAMETER
                      - INVALID_PARAMETER
                      - TOO_MANY_OBJECTS
                      - SOURCE_IS_ROOT
                      - SAME_SOURCE_AND_DESTINATION
                      - INVALID_FOLDER_PATH
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "423":
          description: Locked resource - A bulk operation is currently running on the folder.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - A bulk job is running on given folder path, please try after sometime.
                      - Destination folder path is already locked. Please try after sometime.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v2/bulkJobs/moveFolder:
    post:
      tags:
        - Digital Asset Management (DAM)
        - Managing folders
      operationId: move-folder
      summary: Move folder
      description: |
        Move a folder and all its contents (nested files, subfolders, and all file versions) to another location. The source folder is removed after the move. This is an **async operation** — returns a `jobId` immediately. Poll `bulk-job-status` to check completion.

        **When to use:** Relocate an entire folder tree to a different location. To move a single file, use `move-file` instead. To keep the original folder, use `copy-folder`.

        **Behavior:** If a file at the destination has the same name, source file versions are appended to the destination file's version history.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - sourceFolderPath
                - destinationPath
              properties:
                sourceFolderPath:
                  type: string
                  description: |
                    The full path to the source folder you want to move.
                  example: /path/of/source/folder
                destinationPath:
                  type: string
                  description: |
                    Full path to the destination folder where you want to move the source folder into.
                  example: /path/of/destination/folder
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "404":
          description: Folder not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  reason:
                    type: string
                    example: NO_FILES_FOLDER
                  message:
                    type: string
                    example: No files & folder found at sourceFolderPath `/folder/to/move`.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: This operation is not allowed because parent folder cannot be moved into child folder.
                  reason:
                    type: string
                    examples:
                      - MISSING_PARAMETER
                      - INVALID_PARAMETER
                      - TOO_MANY_OBJECTS
                      - SOURCE_IS_ROOT
                      - SAME_SOURCE_AND_DESTINATION
                      - INVALID_FOLDER_PATH
                      - INVALID_DESTINATION_PATH
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "423":
          description: Locked resource - A bulk operation is currently running on the folder.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - A bulk job is running on given folder path, please try after sometime.
                      - Destination folder path is already locked. Please try after sometime.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v2/bulkJobs/renameFolder:
    post:
      tags:
        - Digital Asset Management (DAM)
        - Managing folders
      operationId: rename-folder
      summary: Rename folder
      description: |
        Rename an existing folder. All nested assets and subfolders keep their contents, but their paths update to reflect the new name. This is an **async operation** — returns a `jobId` immediately. Poll `bulk-job-status` to check completion.

        **When to use:** Change a folder's name while keeping it in the same location. To move a folder to a different parent, use `move-folder` instead.

        **Important:** Old file URLs under the renamed folder path stop working immediately. Set `purgeCache=true` to clear CDN cache for the old URLs (counts against your monthly purge quota).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - folderPath
                - newFolderName
              properties:
                folderPath:
                  type: string
                  description: |
                    The full path to the folder you want to rename.
                  example: /path/of/folder
                newFolderName:
                  type: string
                  description: |
                    The new name for the folder.

                    All characters except alphabets and numbers (inclusive of unicode letters, marks, and numerals in other languages) and `-` will be replaced by an underscore i.e. `_`.
                  example: new-folder-name
                purgeCache:
                  type: boolean
                  description: |
                    Option to purge cache for the old nested files and their versions' URLs.

                    When set to true, it will internally issue a purge cache request on CDN to remove the cached content of the old nested files and their versions. There will only be one purge request for all the nested files, which will be counted against your monthly purge quota.

                    Note: A purge cache request will be issued against `https://ik.imagekit.io/old/folder/path*` (with a wildcard at the end). This will remove all nested files, their versions' URLs, and any transformations made using query parameters on these files or their versions. However, the cache for file transformations made using path parameters will persist. You can purge them using the purge API. For more details, refer to the purge API documentation.

                    Default value - `false`
                  example: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - folderPath cannot be root.
                      - folderPath parameter is missing.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Folder not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Source folder not found.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "409":
          description: If a folder with newFileName already exist in the same location.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Folder with name newFolderName already exists at the same location.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "423":
          description: Locked resource - A bulk operation is currently running on the folder.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - A bulk job is running on given folder path, please try after sometime.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
  /api/v2/bulkJobs/{jobId}:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Managing folders
      operationId: bulk-job-status
      summary: Bulk job status
      description: |
        Returns the current status and details of a bulk job (copy folder, move folder, or rename folder). These operations run asynchronously — use the `jobId` returned by the copy/move/rename folder APIs to poll for completion.

        **Statuses:** `Pending` (still processing), `Completed` (finished successfully), `Partial success` (only possible for rename folder with `purgeCache: true` — the rename succeeded but cache purge failed).
      parameters:
        - description: |
            The `jobId` is returned in the response of bulk job API e.g. copy folder or move folder API.
          in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: |
            On success, you will receive the status of the bulk job in the response body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: |
                      Unique identifier of the bulk job.
                  type:
                    type: string
                    description: |
                      Type of the bulk job.
                    enum:
                      - COPY_FOLDER
                      - MOVE_FOLDER
                      - RENAME_FOLDER
                  status:
                    type: string
                    description: |
                      Status of the bulk job.
                    enum:
                      - Pending
                      - Completed
                  purgeRequestId:
                    type: string
                    description: |
                      Unique identifier of the purge request. This will be present only if `purgeCache` is set to `true` in the rename folder API request.
                example:
                  jobId: 5d5b1a9b4c8c4c0001f3e4a2
                  type: COPY_FOLDER
                  status: Completed
        "207":
          description: |
            Partial success – the folder was renamed, but purge cache failed for nested files. It is only returned when `purgeCache` is set `true` in the rename folder API request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: |
                      Unique identifier of the bulk job.
                  type:
                    type: string
                    description: |
                      Type of the bulk job. It is only possible for `RENAME_FOLDER`.
                  status:
                    type: string
                    description: |
                      Status of the bulk job. It will be `Partial success`.
                  message:
                    type: string
                    example: Folder renamed successfully but purging cache on nested files failed.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
                example:
                  jobId: 5d5b1a9b4c8c4c0001f3e4a2
                  type: RENAME_FOLDER
                  status: Partial success
                  message: Folder renamed successfully but purging cache on nested files failed.
                  help: For support kindly contact us at support@imagekit.io.
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The requested job does not exist.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
  /api/v2/media-collections:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Media Collections
      operationId: list-media-collections
      summary: List media collections
      description: |
        List all media collections in the account with optional filtering, sorting, and pagination. Media collections are curated groups of assets (like albums or boards) that organize files independently of folder structure.

        **When to use:** Browse or search existing collections before adding/removing assets. Use `searchQuery` to filter by collection name. To see files inside a specific collection, use `get-media-collection-assets` instead.
      parameters:
        - in: query
          name: skip
          required: false
          description: |
            The number of results to skip before returning results. Used for pagination.
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          required: false
          description: |
            The maximum number of results to return in response. Maximum value is 1000.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1000
        - in: query
          name: sort
          required: false
          description: |
            Sort the results by one of the supported fields in ascending or descending order.
          schema:
            type: string
            enum:
              - ASC_NAME
              - DESC_NAME
              - ASC_CREATED
              - DESC_CREATED
              - ASC_UPDATED
              - DESC_UPDATED
            default: ASC_CREATED
        - in: query
          name: searchQuery
          required: false
          description: |
            Query string to search media collections. Format: `(name:"collection-name")` or `(permission:["READ"])`.
          schema:
            type: string
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: Array of media collection objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaCollection"
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid skip parameter value.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
    post:
      tags:
        - Digital Asset Management (DAM)
        - Media Collections
      operationId: create-media-collection
      summary: Create media collection
      description: |
        Create a new media collection for organizing assets into a curated group. Optionally set custom metadata fields on the collection at creation time.

        **When to use:** Create a collection before adding assets to it (e.g., "Summer Campaign 2024", "Product Catalog"). To add files to an existing collection, use `add-assets-to-media-collections`.

        **Constraints:** Collection name must be unique, cannot contain slashes (`/`), and cannot be empty.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  pattern: "^(?!.*/).*$"
                  description: |
                    The name of the media collection. Must be unique and cannot contain slashes.
                  example: summer-campaign-2023
                customMetadata:
                  type: object
                  description: |
                    Optional custom metadata fields for the collection. Keys must be existing custom metadata field names in your account.
                  example:
                    brand: "Nike"
                    campaign: "Summer 2023"
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: Media collection created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mediaCollectionId:
                    type: string
                    description: The unique ID of the created media collection.
                    example: "507f1f77bcf86cd799439011"
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Parameter 'name' is missing.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
                  errors:
                    type: array
                    description: Validation errors for custom metadata fields.
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        error:
                          type: string
  /api/v2/media-collections/{mediaCollectionId}/details:
    get:
      tags:
        - Digital Asset Management (DAM)
        - Media Collections
      operationId: get-media-collection-details
      summary: Get media collection details
      description: |
        Retrieve a media collection's name, custom metadata, creator info, and timestamps by its ID.

        **When to use:** Inspect a collection's properties before updating it, or display collection details in a UI. To see the files inside the collection, use `get-media-collection-assets`. To check who has access, use `get-media-collection-access-list`.
      parameters:
        - in: path
          name: mediaCollectionId
          required: true
          description: |
            The unique ID of the media collection (MongoDB ObjectId format).
          schema:
            type: string
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "200":
          description: Media collection details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaCollectionDetails"
        "404":
          description: Media collection not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Media collection not found.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
        "400":
          description: Bad request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Parameter 'mediaCollectionId' must be a valid Id.
                  help:
                    type: string
                    example: For support kindly contact us at support@imagekit.io.
    patch:
      tags:
        - Digital Asset Management (DAM)
        - Media Collections
      operationId: update-media-collection-details
      summary: Update media collection custom metadata
      description: |
        Update **custom metadata fields** on a media collection (e.g., brand, campaign, season). Does not change the collection's name or access permissions.

        **When to use:** Set or modify metadata values on a collection. To change the collection's **name or access permissions (ACL)**, use `update-media-collection` instead.
      parameters:
        - in: path
          name: mediaCollectionId
          required: true
          description: |
            The unique ID of the media collection (MongoDB ObjectId format).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customMetadata
              properties:
                customMetadata:
                  type: object
                  minProperties: 1
                  description: |
                    Custom metadata fields to update. At least one field is required.
                  example:
                    brand: "Adidas"
                    season: "Winter 2023"
      responses:
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "204":
          description: Media collection details updated successfully.
        "404":
          description: Media collection not found.
          content:
            application/json:
              schema:
