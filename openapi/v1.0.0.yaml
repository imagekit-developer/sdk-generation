      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                thumbnail:
                  type: string
                  format: binary
                  description: |
                    The thumbnail image file to upload.
                fileName:
                  type: string
                  description: |
                    Optional filename for the thumbnail.
                action:
                  type: string
                  enum:
                    - remove
                  description: |
                    Set to "remove" to delete the current thumbnail.
      responses:
        "429":
